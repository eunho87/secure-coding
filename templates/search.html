{% extends "base.html" %}
{% block title %}상품 검색{% endblock %}
{% block content %}
<h2>상품 검색</h2>
<form method="get">
  <input type="text" name="q" maxlength="100" value="{{ query }}" placeholder="상품명 또는 설명으로 검색">
  <div class="filter-row">
    <select name="category">
      <option value="">전체 카테고리</option>
      {% for c in CATEGORIES %}
        <option value="{{ c }}" {% if category == c %}selected{% endif %}>{{ c }}</option>
      {% endfor %}
    </select>
    <input type="number" name="min_price" min="1" placeholder="최소 가격" value="{{ min_price }}">
    <input type="number" name="max_price" min="1" placeholder="최대 가격" value="{{ max_price }}">
    <select name="sort">
      <option value="recent" {% if sort == 'recent' %}selected{% endif %}>최신순</option>
      <option value="price_asc" {% if sort == 'price_asc' %}selected{% endif %}>낮은 가격순</option>
      <option value="price_desc" {% if sort == 'price_desc' %}selected{% endif %}>높은 가격순</option>
      <option value="popular" {% if sort == 'popular' %}selected{% endif %}>인기순(조회수)</option>
    </select>
  </div>
  <button type="submit">검색</button>
</form>

{% if query or category or min_price or max_price %}
  <h3>검색 결과 ({{ products|length }}건)</h3>
  {% include "_product_grid.html" %}
{% endif %}
{% endblock %}
