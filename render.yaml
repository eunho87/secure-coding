# Render.com 배포 설정 (무료 티어로 실도메인 https://<name>.onrender.com 제공)
# 대시보드에서 이 저장소를 연결하면 자동 인식됩니다.
services:
  - type: web
    name: mymarket
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt gunicorn gevent gevent-websocket
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true      # Render가 안전한 랜덤 값 생성
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: TRUST_PROXY
        value: "1"
      - key: ADMIN_PASSWORD
        sync: false              # 대시보드에서 직접 강력한 값 입력
      - key: PAYMENT_PROVIDER
        value: "mock"            # 실결제는 toss + 본인 키로 전환
