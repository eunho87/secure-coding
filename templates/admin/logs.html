{% extends "base.html" %}
{% block title %}감사 로그{% endblock %}
{% block content %}
<h2>감사 로그 (최근 200건)</h2>
<table>
  <tr><th>일시(UTC)</th><th>사용자</th><th>행동</th><th>상세</th><th>IP</th></tr>
  {% for log in logs %}
    <tr>
      <td>{{ log.created_at }}</td>
      <td>{{ log.username or '-' }}</td>
      <td>{{ log.action }}</td>
      <td>{{ log.detail }}</td>
      <td>{{ log.ip }}</td>
    </tr>
  {% endfor %}
</table>
<p><a href="{{ url_for('admin_dashboard') }}">← 관리자 대시보드</a></p>
{% endblock %}
