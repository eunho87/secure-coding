{% extends "base.html" %}
{% block title %}2단계 인증 설정{% endblock %}
{% block content %}
<h2>2단계 인증 설정</h2>
<p>1. Google Authenticator, Authy 등 TOTP 앱을 엽니다.</p>
<p>2. 아래 시크릿 키를 수동으로 입력하거나 otpauth 주소를 등록합니다.</p>
<div class="secret-box">시크릿 키: {{ secret }}</div>
<div class="secret-box">{{ otpauth }}</div>
<p>3. 앱에 표시된 6자리 코드를 입력해 설정을 완료하세요.</p>
<form method="post" action="{{ url_for('twofa_confirm') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  인증 코드 (6자리): <input type="text" name="code" maxlength="6" pattern="\d{6}" required>
  <button type="submit">설정 완료</button>
</form>
{% endblock %}
