{% extends "base.html" %}
{% block title %}신고하기{% endblock %}
{% block content %}
<h2>신고하기</h2>
<p class="muted">허위 신고는 제재 대상이 될 수 있습니다. 동일 대상에 대한 중복 신고는 접수되지 않습니다.</p>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  신고 대상 유형:
  <select name="target_type">
    <option value="user" {% if prefill_type == 'user' %}selected{% endif %}>사용자</option>
    <option value="product" {% if prefill_type == 'product' %}selected{% endif %}>상품</option>
  </select>
  신고 대상 (사용자명 또는 상품 ID): <input type="text" name="target" maxlength="100" value="{{ prefill_target }}" required>
  신고 사유 (500자 이내):
  <textarea name="reason" rows="4" maxlength="500" required></textarea>
  <button type="submit">신고 접수</button>
</form>
{% endblock %}
